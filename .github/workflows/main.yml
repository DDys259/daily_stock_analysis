name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 0 * * *'    # 北京时间 08:00 (UTC 00:00)
    - cron: '0 3 * * *'    # 北京时间 11:00 (UTC 03:00)
    - cron: '30 7 * * *'   # 北京时间 15:30 (UTC 07:30)
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 运行分析脚本
        run: python main.py

      - name: 生成报告主页
        run: |
          cd ./reports
          latest_md=$(ls -t *.md 2>/dev/null | head -1)
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>每日股票分析报告</title>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <style>
              body { max-width: 900px; margin: 0 auto; padding: 20px; font-family: -apple-system, sans-serif; }
            </style>
          </head>
          <body>
            <div id="content"></div>
            <script>
              fetch("MAIN_MD_FILE")
                .then(r => r.text())
                .then(t => { document.getElementById("content").innerHTML = marked.parse(t); });
            </script>
          </body>
          </html>
          HTMLEOF
          sed -i "s|MAIN_MD_FILE|$latest_md|" index.html

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages

      - name: 微信通知
        if: always()
        run: |
          curl -s "https://sctapi.ftqq.com/${{ secrets.SERVERCHAN_KEY }}.send?title=每日股票分析&desp=运行状态：${{ job.status }}，详情 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
